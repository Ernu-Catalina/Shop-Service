version: "3.9"
services:
  shopservice:
    build: ./src/ShopService
    container_name: shop-service
    environment:
      - DOTNET_ENVIRONMENT=Development
      - POSTGRES_CONNECTION=Host=postgres-shop;Port=5432;Database=shopdb;Username=shopuser;Password=shoppass

    ports:
      - "5000:8080"
    depends_on:
      - postgres-shop

  postgres-shop:
    image: postgres:15
    container_name: postgres-shop
    environment:
      POSTGRES_USER: shopuser
      POSTGRES_PASSWORD: shoppass
      POSTGRES_DB: shopdb
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
